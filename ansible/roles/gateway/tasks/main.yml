---
# ansible/roles/gateway/tasks/main.yml
# Configures nginx as a reverse proxy in front of the iii engine

- name: Install nginx
  apt:
    name: nginx
    state: present
    update_cache: true

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Write iii inference API nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/inference-api.conf
    mode: "0644"
  notify: Reload nginx

- name: Enable the inference-api site
  file:
    src: /etc/nginx/sites-available/inference-api.conf
    dest: /etc/nginx/sites-enabled/inference-api.conf
    state: link
  notify: Reload nginx

- name: Allow HTTP through UFW
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS through UFW
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Ensure nginx is started and enabled
  service:
    name: nginx
    state: started
    enabled: true

- name: Validate nginx config
  command: nginx -t
  changed_when: false

handlers:
  - name: Reload nginx
    service:
      name: nginx
      state: reloaded
